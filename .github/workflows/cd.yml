name: cd

on:
  push:
    branches: [master]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./node-backend
          push: true
          tags: |
            ghcr.io/knyazzer/megapolis-tg-bot:latest
            ghcr.io/knyazzer/megapolis-tg-bot:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    # Гейт прод-деплоя: GitHub Environment "production". Включи в нём Required reviewers,
    # чтобы каждый деплой ждал ручного аппрува владельца.
    environment: production
    steps:
      - name: Deploy to VDS over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VDS_HOST }}
          username: root
          key: ${{ secrets.VDS_SSH_KEY }}
          script: |
            set -e
            cd /opt/megapolis-tg-bot

            # Секреты НЕ хранятся в GitHub. Файл .env ведётся ВРУЧНУЮ на сервере
            # (он в .gitignore, деплой его не трогает). Если его нет — падаем явно.
            if [ ! -f .env ]; then
              echo "FATAL: /opt/megapolis-tg-bot/.env отсутствует."
              echo "Создай .env на сервере вручную (секреты живут в нём, не в git)."
              exit 1
            fi

            git fetch origin
            git reset --hard origin/master

            docker compose -f compose.prod.yml pull
            docker compose -f compose.prod.yml up -d --remove-orphans
            docker compose -f compose.prod.yml ps

            sleep 6
            if ! curl -fsS http://127.0.0.1:3000/health; then
              echo "Health check FAILED — логи app/worker:"
              docker compose -f compose.prod.yml logs --tail=120 app worker
              exit 1
            fi
            echo "Deploy OK"
