name: ci

on:
  pull_request:
    branches: [master]
  push:
    branches:
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: node-backend
        run: npm ci

      - name: Syntax check
        working-directory: node-backend
        run: npm run check

      - name: Build Docker image
        run: docker build -t megapolis-tg-bot:ci ./node-backend
