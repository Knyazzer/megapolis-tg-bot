services:
  app:
    build:
      context: ./node-backend
      dockerfile: Dockerfile
    image: megapolis-tg-bot-node:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      APP_URL: ${APP_URL}
      APP_TIMEZONE: ${APP_TIMEZONE:-Europe/Moscow}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE:-${DB_DATABASE:-}}
      DB_USERNAME: ${MYSQL_USER:-${DB_USERNAME:-}}
      DB_PASSWORD: ${MYSQL_PASSWORD:-${DB_PASSWORD:-}}
      ADMIN_LOGIN: ${ADMIN_LOGIN:-admin}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET}
      TELEGRAM_REPLY_MODE: ${TELEGRAM_REPLY_MODE:-webhook}
      TELEGRAM_DRY_RUN: ${TELEGRAM_DRY_RUN:-false}
      ADMIN_TELEGRAM_IDS: ${ADMIN_TELEGRAM_IDS:-}
      FACECAST_API_BASE: ${FACECAST_API_BASE:-https://facecast.net/api/v1}
      FACECAST_UID: ${FACECAST_UID:-}
      FACECAST_API_KEY: ${FACECAST_API_KEY:-}
      FACECAST_API_TOKEN: ${FACECAST_API_TOKEN:-}
      FACECAST_REGISTRATION_MODE: ${FACECAST_REGISTRATION_MODE:-userreg}
      FACECAST_REGISTRATION_ENDPOINT: ${FACECAST_REGISTRATION_ENDPOINT:-insert_key}
      FACECAST_USERREG_ENDPOINT: ${FACECAST_USERREG_ENDPOINT:-https://kassa.facecast.net/api/viewers/register}
      FACECAST_CHANNEL_ID: ${FACECAST_CHANNEL_ID:-11110}
      FACECAST_DEFAULT_STREAM_URL: ${FACECAST_DEFAULT_STREAM_URL:-https://facecast.net/w/6k2njf}
      FACECAST_ACCESS_QUERY_PARAM: ${FACECAST_ACCESS_QUERY_PARAM:-key}
      FACECAST_PASSWORD_QUERY_PARAM: ${FACECAST_PASSWORD_QUERY_PARAM:-password}
      FACECAST_DIRECT_LINK_FALLBACK: ${FACECAST_DIRECT_LINK_FALLBACK:-false}
      FACECAST_DEMO_MODE: ${FACECAST_DEMO_MODE:-false}
      TELEGRAM_CHANNEL_URL: ${TELEGRAM_CHANNEL_URL:-https://t.me/megapolismedia}
      COMPANY_SITE_URL: ${COMPANY_SITE_URL:-https://megapolis.media}
      PRIVACY_URL: ${PRIVACY_URL:-https://bot.knzteam.ru/privacy}
    ports:
      - "${APP_BIND:-127.0.0.1}:${APP_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: ./node-backend
      dockerfile: Dockerfile
    image: megapolis-tg-bot-node:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    command: ["npm", "run", "worker:loop"]
    environment:
      NODE_ENV: production
      APP_URL: ${APP_URL}
      APP_TIMEZONE: ${APP_TIMEZONE:-Europe/Moscow}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE:-${DB_DATABASE:-}}
      DB_USERNAME: ${MYSQL_USER:-${DB_USERNAME:-}}
      DB_PASSWORD: ${MYSQL_PASSWORD:-${DB_PASSWORD:-}}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET}
      TELEGRAM_REPLY_MODE: ${TELEGRAM_REPLY_MODE:-webhook}
      TELEGRAM_DRY_RUN: ${TELEGRAM_DRY_RUN:-false}
      FACECAST_API_BASE: ${FACECAST_API_BASE:-https://facecast.net/api/v1}
      FACECAST_UID: ${FACECAST_UID:-}
      FACECAST_API_KEY: ${FACECAST_API_KEY:-}
      FACECAST_API_TOKEN: ${FACECAST_API_TOKEN:-}
      FACECAST_REGISTRATION_MODE: ${FACECAST_REGISTRATION_MODE:-userreg}
      FACECAST_REGISTRATION_ENDPOINT: ${FACECAST_REGISTRATION_ENDPOINT:-insert_key}
      FACECAST_USERREG_ENDPOINT: ${FACECAST_USERREG_ENDPOINT:-https://kassa.facecast.net/api/viewers/register}
      FACECAST_CHANNEL_ID: ${FACECAST_CHANNEL_ID:-11110}
      FACECAST_DEFAULT_STREAM_URL: ${FACECAST_DEFAULT_STREAM_URL:-https://facecast.net/w/6k2njf}
      FACECAST_ACCESS_QUERY_PARAM: ${FACECAST_ACCESS_QUERY_PARAM:-key}
      FACECAST_PASSWORD_QUERY_PARAM: ${FACECAST_PASSWORD_QUERY_PARAM:-password}
      FACECAST_DIRECT_LINK_FALLBACK: ${FACECAST_DIRECT_LINK_FALLBACK:-false}
      FACECAST_DEMO_MODE: ${FACECAST_DEMO_MODE:-false}
      WORKER_INTERVAL_MS: ${WORKER_INTERVAL_MS:-60000}

  db:
    image: mysql:8.0
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+03:00
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-${DB_PASSWORD:-}}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-${DB_DATABASE:-}}
      MYSQL_USER: ${MYSQL_USER:-${DB_USERNAME:-}}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-${DB_PASSWORD:-}}
      TZ: ${APP_TIMEZONE:-Europe/Moscow}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
      - ./database/migrations/2026_06_18_add_photo_broadcast_type.sql:/docker-entrypoint-initdb.d/03-add-photo-broadcast-type.sql:ro
      - ./database/migrations/2026_06_19_add_facecast_ticket_id.sql:/docker-entrypoint-initdb.d/04-add-facecast-ticket-id.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u\"$${MYSQL_USER}\" -p\"$${MYSQL_PASSWORD}\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql_data:
